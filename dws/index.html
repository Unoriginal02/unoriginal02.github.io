<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deep Work Schedule</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Prioritization Slide-in Panel -->
    <div id="prioritizationPanel" aria-hidden="true">
        <div class="panel-header">
            <span>Prioritization</span>
            <button id="closePrioritizationPanel" class="panel-close" aria-label="Close">
                <i class="bi bi-x"></i>
            </button>
        </div>
        <div class="panel-field">
            <label for="prioTop3">Top 3 tasks</label>
            <textarea id="prioTop3" class="panel-textarea" spellcheck="false" placeholder="1) &#10;2) &#10;3) "></textarea>
        </div>
        <div class="panel-field">
            <label for="prioOther">Other Tasks</label>
            <textarea id="prioOther" class="panel-textarea" spellcheck="false" placeholder="- "></textarea>
        </div>
        <div class="panel-field">
            <label for="prioIdeas">Ideas</label>
            <textarea id="prioIdeas" class="panel-textarea" spellcheck="false" placeholder="• "></textarea>
        </div>
        <div class="panel-hint">
            Tip: Use <kbd>Tab</kbd> to indent and <kbd>Shift</kbd>+<kbd>Tab</kbd> to de-indent.
        </div>
    </div>

    <!-- Duplicate Instance Overlay -->
    <div id="duplicate-instance-message">
        <p>The application is already open in another tab or window. Please use the existing instance.</p>
    </div>

    <div id="mainContent">
        <div class="maxwidth container text-center my-5">
            <!-- Time / Week Selectors -->
            <div class="row mb-4">
                <div class="col-md-4 mb-2">
                    <label for="weekMonday" class="form-label">Week (Monday)</label>
                    <input type="date" id="weekMonday" class="form-control">
                </div>
                <div class="col-md-4 mb-2">
                    <label for="startTime" class="form-label">Start Time</label>
                    <input type="time" id="startTime" class="form-control" value="08:00" step="900">
                </div>
                <div class="col-md-4 mb-2">
                    <label for="endTime" class="form-label">End Time</label>
                    <input type="time" id="endTime" class="form-control" value="18:00" step="900">
                </div>
            </div>

            <!-- Timetable -->
            <div id="timetable-container" class="table-responsive" style="position: relative;">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th id="thMonday">Monday</th>
                            <th id="thTuesday">Tuesday</th>
                            <th id="thWednesday">Wednesday</th>
                            <th id="thThursday">Thursday</th>
                            <th id="thFriday">Friday</th>
                        </tr>
                    </thead>
                    <tbody id="timetable-body"></tbody>
                </table>
                <div id="currentTimeLine" class="current-time-line" style="display: none;"></div>
            </div>

            <!-- Action Buttons -->
            <div class="buttonGroup mt-3">
                <button id="exportButton" class="brutalButton">
                    <i class="bi bi-download"></i> Export
                </button>
                <button id="importButton" class="brutalButton">
                    <i class="bi bi-upload"></i> Import
                </button>
                <button id="wipeButton" class="brutalButton">
                    <i class="bi bi-trash"></i> Wipe
                </button>
                <input type="file" id="importFileInput" accept="application/json">
            </div>
        </div>
    </div>

    <!-- Mode / Settings Panel -->
    <div class="mode-buttons">
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="notifyToggle">
            <label class="form-check-label" for="notifyToggle">Notify</label>
        </div>
        <button id="lightModeButton" class="mode-switcher">
            <i class="bi bi-sun"></i> Light Mode
        </button>
        <button id="darkModeButton" class="mode-switcher active-mode">
            <i class="bi bi-moon"></i> Dark Mode
        </button>
        <button id="demureModeButton" class="mode-switcher">
            <i class="bi bi-stars"></i> Demure Mode
        </button>
        <button id="prioritizationButton" class="mode-switcher" style="margin-top: 14px;">
            <i class="bi bi-list-task"></i> Prioritization
        </button>
        <button id="clickupSettingsButton" class="mode-switcher">
            <i class="bi bi-plug"></i> ClickUp
        </button>
        <div id="clickupTokenSection" style="display:none;">
            <input type="password" id="clickupTokenInput" class="form-control form-control-sm"
                placeholder="Paste API token here..." autocomplete="off">
            <button id="saveClickupTokenBtn" class="brutalButton mt-1" style="width:100%;">
                <i class="bi bi-check-lg" id="saveClickupIcon"></i>
                <span id="saveClickupLabel">Save token</span>
            </button>
            <small id="clickupConnectedInfo" style="display:none; opacity:0.7; margin-top:4px; display:block;"></small>
        </div>
    </div>

    <!-- Time Block Modal -->
    <div class="modal fade" id="timeBlockModal" tabindex="-1" aria-labelledby="timeBlockModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 id="timeBlockModalLabel" class="modal-title">Create/Edit Time Block</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="timeBlockForm">
                        <div class="row mb-3">
                            <div class="col-6">
                                <label for="modalStartTime" class="form-label">Start Time</label>
                                <input type="time" id="modalStartTime" class="form-control">
                            </div>
                            <div class="col-6">
                                <label for="modalEndTime" class="form-label">End Time</label>
                                <input type="time" id="modalEndTime" class="form-control">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-12">
                                <label for="modalProjectName" class="form-label">Project Name</label>
                                <div class="d-flex gap-2">
                                    <input type="text" id="modalProjectName" class="form-control">
                                    <button type="button" id="openPresetListButton" class="brutalButton" title="Open saved project/task pairs">
                                        <i class="bi bi-archive"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-6">
                                <label for="modalTaskName" class="form-label">Task Name</label>
                                <input type="text" id="modalTaskName" class="form-control">
                            </div>
                            <div class="col-6">
                                <label for="modalTaskId" class="form-label">Task ID</label>
                                <div class="d-flex gap-2">
                                    <input type="text" id="modalTaskId" class="form-control">
                                    <button type="button" id="openTaskLinkButton" class="brutalButton"
                                        title="Open task in ClickUp" aria-label="Open task in ClickUp">
                                        <i class="bi bi-box-arrow-up-right"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="modalDescription" class="form-label">Description</label>
                            <textarea id="modalDescription" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="mb-3 d-flex align-items-center justify-content-between gap-3">
                            <button id="loggedToggleButton" type="button" class="brutalButton">
                                <i class="bi bi-check-circle"></i>
                                <span>Logged</span>
                            </button>
                        </div>

                        <div class="mb-3">
                            <label for="modalColor" class="form-label">Color</label>
                            <select id="modalColor" class="form-select" required></select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <div class="modal-copy-row">
                        <button id="copyDescriptionButton" type="button" class="brutalButton iconBtn">
                            <i class="bi bi-chat-left-text"></i>
                            <span class="btnLabel">Copy Description</span>
                        </button>
                        <button id="copyTaskIdButton" type="button" class="brutalButton iconBtn">
                            <i class="bi bi-upc-scan"></i>
                            <span class="btnLabel">Copy Task ID</span>
                        </button>
                        <button id="copyTotalTimeButton" type="button" class="brutalButton iconBtn">
                            <i class="bi bi-stopwatch"></i>
                            <span class="btnLabel">Copy Total Time</span>
                        </button>
                    </div>
                    <div class="modal-copy-row" id="imputarRow" style="display:none;">
                        <button id="imputarButton" type="button" class="brutalButton iconBtn">
                            <i class="bi bi-clock-history" id="imputarIcon"></i>
                            <span class="btnLabel" id="imputarLabel">Imputar horas</span>
                        </button>
                    </div>
                    <div class="modal-copy-row">
                        <button id="deleteButton" type="button" class="brutalButton iconBtn" style="display:none;">
                            <i class="bi bi-trash"></i>
                            <span class="btnLabel">Delete</span>
                        </button>
                        <button id="copyButton" type="button" class="brutalButton iconBtn">
                            <i class="bi bi-clipboard"></i>
                            <span class="btnLabel">Copy</span>
                        </button>
                        <button id="importCardButton" type="button" class="brutalButton iconBtn">
                            <i class="bi bi-clipboard-plus"></i>
                            <span class="btnLabel">Import</span>
                        </button>
                        <button id="syncCardButton" type="button" class="brutalButton iconBtn" style="display:none;">
                            <i class="bi bi-arrow-repeat"></i>
                            <span class="btnLabel">Sync</span>
                        </button>
                        <button id="acceptButton" type="button" class="brutalButton iconBtn">
                            <i class="bi bi-patch-check"></i>
                            <span class="btnLabel">Accept</span>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Task Picker Modal -->
    <div class="modal fade" id="taskPickerModal" tabindex="-1" aria-labelledby="taskPickerModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="taskPickerModalLabel">Select Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">

                    <!-- 1. Recently used presets -->
                    <label class="form-label">Recently used</label>
                    <div id="presetList" class="list-group mb-3"></div>

                    <!-- 2. Fetch by ID/URL (only if configured) -->
                    <div id="cuFetchRow" class="mb-3" style="display:none;">
                        <div class="d-flex gap-2">
                            <input type="text" id="cuFetchInput" class="form-control form-control-sm"
                                placeholder="Paste task ID or ClickUp URL...">
                            <button type="button" id="cuFetchBtn" class="brutalButton" title="Fetch from ClickUp">
                                <i class="bi bi-cloud-download" id="cuFetchIcon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 3. My ClickUp Tasks (only if configured) -->
                    <div id="cuTasksSection" style="display:none;">
                        <div class="d-flex align-items-center justify-content-between mb-1">
                            <label class="form-label mb-0">My ClickUp Tasks</label>
                            <button type="button" id="cuRefreshBtn" class="brutalButton"
                                style="padding:2px 8px; font-size:0.7rem; line-height:1.4;">
                                <i class="bi bi-arrow-repeat"></i>
                            </button>
                        </div>
                        <div id="cuTasksLoading" style="display:none; opacity:0.7; padding:4px 0;">Loading tasks...</div>
                        <div id="cuTasksList" class="list-group"></div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Custom Tooltip -->
    <div id="customTooltip" class="custom-tooltip with-border"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Heartbeat check runs before anything else -->
    <script type="module">
        import { initHeartbeat } from './js/heartbeat.js';
        if (initHeartbeat()) {
            // Primary instance — load the app
            import('./js/app.js');
        }
    </script>
</body>
</html>
